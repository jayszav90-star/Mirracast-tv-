<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>MirrorCast TV</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #060610; --surface: #0f0f1e; --accent: #7c5cfc; --accent2: #00e5ff;
  --text: #e8e4ff; --muted: #6b6890; --success: #00e5a0; --danger: #ff4d4d; --warning: #ffc947;
}
html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }

/* VIDEO */
#video-wrap { position:fixed; inset:0; background:#000; display:none; z-index:5; }
#rv { width:100%; height:100%; object-fit:contain; display:block; }
#live-badge { position:absolute; top:16px; right:16px; background:rgba(255,40,40,.88); padding:5px 14px; border-radius:6px; font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
.live-dot { width:7px; height:7px; border-radius:50%; background:#fff; animation:bl 1s infinite; }
@keyframes bl { 0%,100%{opacity:1}50%{opacity:.3} }

/* PAUSE SCREEN (shown on TV when sender pauses) */
#pause-screen {
  position:fixed; inset:0; background:#000; z-index:10; display:none;
  align-items:center; justify-content:center; flex-direction:column; gap:12px;
}
.pause-logo { font-size:48px; margin-bottom:8px; }
.pause-text { font-size:20px; font-weight:700; color:rgba(255,255,255,.6); }
.pause-sub { font-size:13px; color:rgba(255,255,255,.3); }

/* SETUP SCREEN */
#setup { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:32px; background:radial-gradient(ellipse at 50% -10%, rgba(124,92,252,.18) 0%, transparent 65%); }

.box { background:var(--surface); border:1px solid rgba(124,92,252,.2); border-radius:20px; padding:40px; width:100%; max-width:560px; }
.box-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
.box-logo-icon { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:22px; }
.box-logo-text { font-size:22px; font-weight:800; letter-spacing:.04em; }
.box-logo-sub { font-size:12px; color:var(--muted); margin-top:2px; }

/* SAVED PCS */
.saved-section { margin-bottom:24px; }
.saved-title { font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
.saved-list { display:flex; flex-direction:column; gap:8px; }
.saved-pc {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  background:rgba(255,255,255,.04); border:1px solid rgba(124,92,252,.15);
  border-radius:10px; cursor:pointer; transition:all .15s;
}
.saved-pc:hover { border-color:var(--accent); background:rgba(124,92,252,.1); }
.saved-pc-icon { font-size:22px; }
.saved-pc-info { flex:1; }
.saved-pc-name { font-size:14px; font-weight:700; }
.saved-pc-detail { font-size:11px; color:var(--muted); font-family:'Courier New',monospace; margin-top:2px; }
.saved-pc-arrow { color:var(--accent); font-size:18px; }
.no-saved { font-size:12px; color:var(--muted); text-align:center; padding:12px; }

/* DIVIDER */
.or-divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
.or-line { flex:1; height:1px; background:rgba(255,255,255,.08); }
.or-text { font-size:11px; color:var(--muted); font-weight:600; }

/* TABS */
.tabs { display:flex; gap:6px; background:rgba(255,255,255,.04); border-radius:10px; padding:4px; margin-bottom:20px; }
.tab { flex:1; padding:9px; border-radius:7px; cursor:pointer; font-size:13px; font-weight:700; color:var(--muted); transition:all .2s; border:none; background:none; font-family:inherit; }
.tab.active { background:var(--accent); color:white; }

/* INPUTS */
.field { margin-bottom:12px; }
.field-label { font-size:10px; font-weight:700; letter-spacing:.08em; color:var(--muted); text-transform:uppercase; margin-bottom:5px; }
.inp {
  width:100%; padding:12px 14px; background:rgba(255,255,255,.05);
  border:1px solid rgba(124,92,252,.2); border-radius:10px; color:var(--text);
  font-size:14px; outline:none; font-family:inherit; transition:border-color .15s;
}
.inp:focus { border-color:var(--accent); }

/* CODE INPUT */
.code-row { display:flex; gap:8px; justify-content:center; margin-bottom:16px; }
.cc {
  width:54px; height:66px; background:rgba(255,255,255,.05);
  border:2px solid rgba(124,92,252,.2); border-radius:10px;
  font-size:28px; font-weight:800; text-align:center; color:var(--accent2);
  font-family:'Courier New',monospace; outline:none; transition:border-color .15s; text-transform:uppercase;
}
.cc:focus { border-color:var(--accent); background:rgba(124,92,252,.08); }

/* SAVE PC checkbox row */
.save-row { display:flex; align-items:center; gap:10px; padding:10px 0; margin-bottom:4px; cursor:pointer; }
.save-cb { width:18px; height:18px; border-radius:4px; border:2px solid rgba(124,92,252,.4); background:rgba(124,92,252,.08); display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.save-cb.checked { background:var(--accent); border-color:var(--accent); }
.save-cb.checked::after { content:'✓'; color:white; font-size:11px; font-weight:700; }
.save-cb-label { font-size:13px; font-weight:600; }

/* CONNECT BTN */
.conn-btn {
  width:100%; padding:14px; background:var(--accent); color:white;
  border:none; border-radius:10px; font-size:16px; font-weight:800;
  cursor:pointer; font-family:inherit; transition:all .15s; margin-top:8px;
  box-shadow:0 4px 24px rgba(124,92,252,.35);
}
.conn-btn:hover { background:#8d6dff; transform:translateY(-1px); }
.conn-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

.status { margin-top:14px; font-size:13px; min-height:18px; text-align:center; font-weight:600; }
.status.ok { color:var(--success); } .status.err { color:var(--danger); } .status.loading { color:var(--accent2); }

/* DISCONNECT */
#dc-btn { position:fixed; bottom:20px; right:20px; z-index:20; background:rgba(255,77,77,.85); color:white; border:none; padding:10px 22px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; display:none; }
</style>
</head>
<body>

<!-- PAUSE SCREEN (TV shows this when PC sender pauses) -->
<div id="pause-screen">
  <div class="pause-logo">⏸</div>
  <div class="pause-text">Presenter paused</div>
  <div class="pause-sub">Stream will resume shortly</div>
</div>

<!-- VIDEO -->
<div id="video-wrap">
  <video id="rv" autoplay playsinline></video>
  <div id="live-badge"><div class="live-dot"></div>LIVE</div>
</div>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="box">
    <div class="box-logo">
      <div class="box-logo-icon">📡</div>
      <div>
        <div class="box-logo-text">MirrorCast</div>
        <div class="box-logo-sub">Android TV Receiver</div>
      </div>
    </div>

    <!-- SAVED PCs (quick-connect) -->
    <div class="saved-section" id="saved-section" style="display:none">
      <div class="saved-title">💾 Quick Connect</div>
      <div class="saved-list" id="saved-list"></div>
      <div class="or-divider"><div class="or-line"></div><div class="or-text">OR CONNECT MANUALLY</div><div class="or-line"></div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="tab-lan" onclick="switchTab('lan')">📶 LAN</button>
      <button class="tab" id="tab-remote" onclick="switchTab('remote')">🌐 Remote</button>
    </div>

    <!-- LAN -->
    <div id="lan-fields">
      <div class="field"><div class="field-label">PC IP Address</div><input class="inp" id="lan-ip" placeholder="e.g. 192.168.1.100" type="text"/></div>
      <div class="field"><div class="field-label">Port (default 9001)</div><input class="inp" id="lan-port" value="9001" type="number"/></div>
      <div class="field-label" style="margin-bottom:8px">Connection Code (from PC app)</div>
      <div class="code-row" id="code-boxes-lan"></div>
    </div>

    <!-- Remote -->
    <div id="remote-fields" style="display:none">
      <div class="field"><div class="field-label">Server URL</div><input class="inp" id="remote-url" placeholder="wss://your-server.railway.app"/></div>
      <div class="field-label" style="margin-bottom:8px">Session Code</div>
      <div class="code-row" id="code-boxes-remote"></div>
    </div>

    <!-- Save this PC -->
    <div class="save-row" onclick="toggleSaveCB()">
      <div class="save-cb checked" id="save-cb"></div>
      <div class="save-cb-label">Remember this PC for next time</div>
    </div>
    <div class="field" id="pc-name-field">
      <div class="field-label">PC Name (to identify it)</div>
      <input class="inp" id="pc-name" placeholder="e.g. Reception Desk PC"/>
    </div>

    <button class="conn-btn" id="conn-btn" onclick="connect()">Connect to PC</button>
    <div class="status" id="status-txt"></div>
  </div>
</div>

<button id="dc-btn" onclick="disconnect()">✕ Disconnect</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const STORAGE_KEY = 'mirrorcast_saved_pcs';
let savedPCs = [];
let socket = null, pc = null;
let tab = 'lan', code = '', saveCB = true;

// ── Persistent storage ────────────────────────────────────────────────────────
function loadSavedPCs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}
function savePCsToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(savedPCs));
}
function savePC(name, ip, port, serverUrl) {
  const existing = savedPCs.findIndex(p => p.ip === ip && p.port === port);
  const entry = { id: existing >= 0 ? savedPCs[existing].id : Date.now().toString(), name, ip, port, serverUrl, lastSeen: Date.now() };
  if (existing >= 0) savedPCs[existing] = entry;
  else savedPCs.unshift(entry);
  savePCsToStorage();
}
function deletePC(id) {
  savedPCs = savedPCs.filter(p => p.id !== id);
  savePCsToStorage();
  renderSaved();
}

// ── Render saved PCs ──────────────────────────────────────────────────────────
function renderSaved() {
  savedPCs = loadSavedPCs();
  const section = document.getElementById('saved-section');
  const list = document.getElementById('saved-list');
  if (savedPCs.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = savedPCs.map(p => `
    <div class="saved-pc" onclick="quickConnect('${p.id}')">
      <div class="saved-pc-icon">🖥️</div>
      <div class="saved-pc-info">
        <div class="saved-pc-name">${p.name}</div>
        <div class="saved-pc-detail">${p.ip}:${p.port}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <div class="saved-pc-arrow">→</div>
        <div onclick="event.stopPropagation();deletePC('${p.id}')" style="color:rgba(255,77,77,.6);cursor:pointer;font-size:14px;padding:4px">✕</div>
      </div>
    </div>
  `).join('');
}

function quickConnect(id) {
  const p = savedPCs.find(x => x.id === id);
  if (!p) return;
  if (p.serverUrl && p.serverUrl.startsWith('ws')) {
    switchTab('remote');
    document.getElementById('remote-url').value = p.serverUrl;
  } else {
    switchTab('lan');
    document.getElementById('lan-ip').value = p.ip;
    document.getElementById('lan-port').value = p.port;
  }
  // Generate a new code — but since the PC does auto-reconnect with saved TVs,
  // the user just needs to click Connect and the PC will accept it
  doConnect(p.serverUrl || `http://${p.ip}:${p.port}`, '', p);
}

// ── Code boxes ────────────────────────────────────────────────────────────────
function buildCodeBoxes(containerId) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const inp = document.createElement('input');
    inp.type = 'text'; inp.maxLength = 1; inp.className = 'cc'; inp.dataset.i = i;
    inp.autocomplete = 'off';
    inp.addEventListener('input', e => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
      if (e.target.value && i < 5) c.children[i+1].focus();
    });
    inp.addEventListener('keydown', e => { if (e.key==='Backspace' && !e.target.value && i>0) c.children[i-1].focus(); });
    c.appendChild(inp);
  }
}
buildCodeBoxes('code-boxes-lan');
buildCodeBoxes('code-boxes-remote');

function getCode(containerId) {
  return Array.from(document.getElementById(containerId).children).map(i => i.value).join('').toUpperCase();
}

function switchTab(t) {
  tab = t;
  document.getElementById('tab-lan').classList.toggle('active', t==='lan');
  document.getElementById('tab-remote').classList.toggle('active', t==='remote');
  document.getElementById('lan-fields').style.display = t==='lan' ? 'block' : 'none';
  document.getElementById('remote-fields').style.display = t==='remote' ? 'block' : 'none';
}

function toggleSaveCB() {
  saveCB = !saveCB;
  document.getElementById('save-cb').classList.toggle('checked', saveCB);
  document.getElementById('pc-name-field').style.display = saveCB ? 'block' : 'none';
}

function setStatus(msg, type='') {
  const el = document.getElementById('status-txt');
  el.textContent = msg; el.className = 'status ' + type;
}

// ── Connect ────────────────────────────────────────────────────────────────────
function connect() {
  let serverUrl, roomCode, pcData;
  if (tab === 'lan') {
    const ip = document.getElementById('lan-ip').value.trim();
    const port = document.getElementById('lan-port').value || '9001';
    roomCode = getCode('code-boxes-lan');
    if (!ip) { setStatus('Enter the PC IP address','err'); return; }
    if (roomCode.length < 6) { setStatus('Enter the 6-digit code','err'); return; }
    serverUrl = `http://${ip}:${port}`;
    pcData = { ip, port: parseInt(port), serverUrl: '' };
  } else {
    serverUrl = document.getElementById('remote-url').value.trim();
    roomCode = getCode('code-boxes-remote');
    if (!serverUrl) { setStatus('Enter server URL','err'); return; }
    if (roomCode.length < 6) { setStatus('Enter session code','err'); return; }
    pcData = { ip: serverUrl, port: 0, serverUrl };
  }
  document.getElementById('conn-btn').disabled = true;
  doConnect(serverUrl, roomCode, pcData);
}

function doConnect(serverUrl, roomCode, pcData) {
  setStatus('Connecting…','loading');
  if (socket) socket.disconnect();
  socket = io(serverUrl, { transports:['websocket'], reconnection:true, timeout:7000 });

  socket.on('connect', () => {
    setStatus('Waiting for PC…','loading');
    if (roomCode) socket.emit('join-room', { roomCode, role:'receiver' });
  });
  socket.on('connect_error', e => { setStatus('Cannot connect: '+e.message,'err'); document.getElementById('conn-btn').disabled=false; });

  socket.on('peer-joined', ({role}) => {
    if (role === 'sender') setStatus('PC found! Setting up stream…','loading');
  });

  socket.on('signal', async ({type, sdp, candidate}) => {
    if (type === 'offer') {
      await initPC();
      await pc.setRemoteDescription(new RTCSessionDescription({type,sdp}));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('signal', { roomCode, type:'answer', sdp:answer.sdp });
      setStatus('Connecting stream…','loading');
    } else if (type === 'candidate' && candidate) {
      try { if(pc) await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e){}
    }
  });

  // Pause/resume control from sender
  socket.on('control', ({cmd}) => {
    if (cmd === 'pause') showPauseScreen();
    else if (cmd === 'resume') hidePauseScreen();
  });

  socket.on('peer-left', () => { setStatus('PC disconnected','err'); showSetup(); });

  // Save PC if checked
  if (saveCB && pcData) {
    const name = document.getElementById('pc-name').value.trim() || 'My PC';
    savePC(name, pcData.ip, pcData.port, pcData.serverUrl);
    renderSaved();
  }
}

// ── WebRTC ────────────────────────────────────────────────────────────────────
async function initPC() {
  if (pc) pc.close();
  pc = new RTCPeerConnection({
    iceServers: [
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'}
    ]
  });
  pc.onicecandidate = ({candidate}) => { if(candidate && socket) socket.emit('signal', {roomCode:'',type:'candidate',candidate}); };
  pc.ontrack = e => {
    const v = document.getElementById('rv');
    if (v.srcObject !== e.streams[0]) { v.srcObject = e.streams[0]; v.play().catch(()=>{}); showStream(); }
  };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState==='connected') setStatus('🟢 Streaming!','ok');
    if (pc.connectionState==='failed'||pc.connectionState==='disconnected') { setStatus('Connection lost','err'); showSetup(); }
  };
}

// ── Pause/Resume UI on TV ─────────────────────────────────────────────────────
function showPauseScreen() {
  document.getElementById('pause-screen').style.display = 'flex';
  document.getElementById('video-wrap').style.display = 'none';
}
function hidePauseScreen() {
  document.getElementById('pause-screen').style.display = 'none';
  document.getElementById('video-wrap').style.display = 'block';
}

// ── Show/hide ────────────────────────────────────────────────────────────────
function showStream() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('video-wrap').style.display = 'block';
  document.getElementById('dc-btn').style.display = 'block';
}
function showSetup() {
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('video-wrap').style.display = 'none';
  document.getElementById('pause-screen').style.display = 'none';
  document.getElementById('dc-btn').style.display = 'none';
  document.getElementById('conn-btn').disabled = false;
}
function disconnect() {
  if (pc) { pc.close(); pc = null; }
  if (socket) { socket.disconnect(); socket = null; }
  showSetup(); setStatus('Disconnected');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderSaved();
</script>
</body>
</html>
